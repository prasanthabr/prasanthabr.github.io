enableGitInfo = true


[params]
  name = "Heres a valiant attempt to collate what makes me tick. To remind my future self on what had inspired in the past."
  description = "Random thoughts and unfinished rants."
  initials = "PMA"
  googleAnalytics = ""

  [[params.social]]
    name = "Twitter"
    link = "https://twitter.com/prasanthabr"
    icon = "fab fa-twitter"

  [[params.social]]
    name = "Github"
    link = "https://github.com/prasanthabr"
    icon = "fab fa-github"

  [[params.social]]
    name = "LinkedIn"
    link = "https://www.linkedin.com/in/pabra/"
    icon = "fab fa-linkedin-in"

  [[params.social]]
    name = "Mastodon"
    link = "https://mastodon.social/@prasanthabr"
    icon = "fab fa-mastodon"
    rel = "me"

    [[params.social]]
    name = "Telegram"
    link = "https://t.me/nxcep"
    icon = "fab fa-telegram"


[menu]
  [[menu.main]]
    name = "Writing"
    url = "/long_form/"
    weight = 1
  [[menu.main]]
    name = "Zettelkasten"
