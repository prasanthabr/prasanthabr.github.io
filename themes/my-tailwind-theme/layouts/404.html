{{ define "main" }}
<div class="flex flex-col items-center justify-center text-center px-4 py-12 md:py-20" style="min-height: calc(100vh - 16rem);">
    <h1 class="text-8xl md:text-9xl font-bold font-heading text-gray-800">404</h1>
    <p class="mt-4 text-2xl md:text-3xl text-gray-600">Page Not Found</p>
    <p class="mt-2 max-w-md text-gray-500">The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.</p>
    <a href="{{ "/" | relURL }}" class="mt-8 px-6 py-3 bg-gray-900 text-white font-semibold rounded-lg shadow-md hover:bg-gray-700 transition-colors duration-300">
        Go back home
    </a>
</div>
{{ end }}
