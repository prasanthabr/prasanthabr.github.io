<!DOCTYPE html>
<html lang="{{ .Site.Language.Lang | default "en-us" }}" class="scroll-smooth">
    {{- partial "head.html" . -}}
    <body class="bg-white text-gray-800 font-sans antialiased">
        {{- partial "header.html" . -}}
        <main id="content" role="main">
            {{- block "main" . }}{{- end }}
        </main>
        {{- partial "footer.html" . -}}
        {{- partial "script.html" . -}}
    </body>
</html>
