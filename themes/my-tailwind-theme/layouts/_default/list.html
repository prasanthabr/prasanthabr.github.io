{{ define "main" }}
<div class="container mx-auto px-4 py-12 md:py-20">
    <header class="mb-12 md:mb-20">
        <h1 class="text-4xl md:text-6xl font-bold font-heading text-gray-900">{{ .Title }}</h1>
        {{ with .Content }}
            <div class="prose max-w-none mt-4">{{ . }}</div>
        {{ end }}
    </header>

    <div>
        {{ range .Paginator.Pages }}
            {{ partial "list_item_agency.html" . }}
        {{ end }}
    </div>

    {{ partial "pagination.html" . }}

</div>
{{ end }}
