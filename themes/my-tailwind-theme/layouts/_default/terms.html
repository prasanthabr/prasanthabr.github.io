{{ define "main" }}
<div class="container mx-auto px-4 py-12 md:py-20">
    <header class="mb-12 md:mb-20">
        <h1 class="text-4xl md:text-6xl font-bold font-heading text-gray-900">{{ .Title }}</h1>
    </header>

    <div class="flex flex-wrap justify-center">
        {{ range .Data.Terms.ByCount }}
            <a href="{{ .Page.RelPermalink }}" class="inline-block bg-gray-100 rounded-full px-4 py-2 text-lg font-semibold text-gray-600 m-2 hover:bg-gray-200 no-underline">
                {{ .Page.Title }} <span class="ml-2 inline-block bg-gray-300 rounded-full px-2 py-1 text-xs">{{ .Count }}</span>
            </a>
        {{ end }}
    </div>
</div>
{{ end }}
