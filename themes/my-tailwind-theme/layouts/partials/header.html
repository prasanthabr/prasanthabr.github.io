<header class="py-6">
    <div class="container mx-auto px-4">
        <nav class="flex justify-between items-center">
            <!-- Logo -->
            <a href="{{ .Site.BaseURL }}" class="text-2xl font-bold font-heading text-gray-900 no-underline">
                {{ .Site.Params.Initials | default .Site.Title }}
            </a>

            <!-- Desktop Menu -->
            <div class="hidden md:flex items-center gap-x-6">
                {{ range .Site.Menus.main }}
                    <a href="{{ .URL }}" class="text-base text-gray-600 hover:text-black no-underline">{{ .Name }}</a>
                {{ end }}
            </div>

            <!-- Mobile Menu Button -->
            <div class="md:hidden">
                <button id="menu-btn" type="button" class="text-gray-900 hover:text-black focus:outline-none">
                    <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
                    </svg>
                </button>
            </div>
        </nav>
    </div>

    <!-- Mobile Menu -->
    <div id="mobile-menu" class="hidden md:hidden">
        <div class="container mx-auto px-4 pt-4 pb-3 space-y-1">
            {{ range .Site.Menus.main }}
                <a href="{{ .URL }}" class="block px-3 py-2 rounded-md text-base font-medium text-gray-600 hover:text-black hover:bg-gray-50">{{ .Name }}</a>
            {{ end }}
        </div>
    </div>
</header>
